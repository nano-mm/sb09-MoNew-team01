name: CD

on:
  push:
    branches: [ main, master, '**' ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build jar (skip tests)
        run: ./gradlew bootJar -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST
    steps:
      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~' }}
            # Pull latest image and restart docker-compose (adjust commands per your deploy setup)
            docker pull ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest || true
            if [ -f docker-compose.yml ]; then
              docker-compose pull || true
              docker-compose up -d --remove-orphans || true
            else
              # fallback: run container directly (customize as needed)
              docker rm -f ${{ github.event.repository.name }} || true
              docker run -d --name ${{ github.event.repository.name }} -p 8080:8080 ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            fi

