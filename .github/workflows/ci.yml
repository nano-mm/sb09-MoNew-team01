name: CI

on:
  pull_request:
    branches: [ test ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Debug: show environment and test config
        run: |
          echo "### JAVA & GRADLE" 
          java -version || true
          ./gradlew --version
          echo "### WORKSPACE FILES" 
          ls -la
          echo "### TEST RESOURCES" 
          ls -la src/test/resources || true
          echo "### application-test.yaml content" 
          if [ -f src/test/resources/application-test.yaml ]; then cat src/test/resources/application-test.yaml; else echo "missing"; fi

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test -Dspring.profiles.active=test --no-daemon --stacktrace || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/**
