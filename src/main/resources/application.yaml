spring:
  application:
    name: monew
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

naver:
  client:
    id: ${NAVER_CLIENT_ID:temp}
    secret: ${NAVER_CLIENT_SECRET:temp}

monew:
  batch:
    news:
      cron: ${NEWS_CRON_TIME:0 0 * * * *}
    newsbackup:
      cron: ${NEWSBACKUP_CRON_TIME:0 0 * * * *}
    notification-cleanup:
      cron: ${NOTIFICATION_CLEANUP_CRON:0 0 3 * * *}
    user-hard-delete:
      cron: ${USER_HARD_DELETE_CRON_TIME:0 0 3 * * *}

app:
  backup:
    dir: ${BACKUP_DIR:file:./backups/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always